name: ESP-IDF Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: python -m pip install --upgrade jsonnet pytest

      - name: Run pytest
        run: python -m pytest tests
  build-example:
    name: Build example (${{ matrix.board }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1

    strategy:
      fail-fast: false
      matrix:
        board:
          - espressif/esp32-devkitc-1
          - espressif/esp32-c3-devkitm-1
          - nologo/esp32-c3-supermini
          - espressif/esp32-s3-devkitc-1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install generator dependencies
        run: python -m pip install --upgrade jsonnet

      - name: Build example
        working-directory: example
        run: idf.py build -DLWDT_BOARD_ID=${{ matrix.board }}
